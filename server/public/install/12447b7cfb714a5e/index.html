<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Install Toca World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px 24px;
            text-align: center;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 26px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .app-version {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 4px;
        }
        .app-size {
            font-size: 13px;
            color: #636366;
            margin-bottom: 32px;
        }
        .install-btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #007AFF 0%, #0055D4 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,122,255,0.3);
        }
        .install-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
        }
        .install-btn:active {
            transform: translateY(0);
        }
        .install-btn-link {
            display: inline-block;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #38383a;
            margin: 32px auto;
        }
        .qr-section {
            margin-top: 8px;
        }
        .qr-label {
            font-size: 13px;
            color: #636366;
            margin-bottom: 16px;
        }
        .qr-code {
            display: inline-block;
            padding: 12px;
            background: #ffffff;
            border-radius: 12px;
        }
        .qr-code img {
            display: block;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #48484a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container > * {
            animation: fadeIn 0.5s ease forwards;
        }
        .container > *:nth-child(1) { animation-delay: 0.1s; opacity: 0; }
        .container > *:nth-child(2) { animation-delay: 0.2s; opacity: 0; }
        .container > *:nth-child(3) { animation-delay: 0.3s; opacity: 0; }
        .container > *:nth-child(4) { animation-delay: 0.4s; opacity: 0; }
        .container > *:nth-child(5) { animation-delay: 0.5s; opacity: 0; }
        .container > *:nth-child(6) { animation-delay: 0.6s; opacity: 0; }
        .container > *:nth-child(7) { animation-delay: 0.7s; opacity: 0; }
    </style>
</head>

            setFinder(len - 7, 0);
            setFinder(0, len - 7);

            for (let i = 8; i < len - 8; i++) {
                grid[6][i] = i % 2 === 0;
                grid[i][6] = i % 2 === 0;
            }

            const data = [];
            for (let i = 0; i < text.length; i++) {
                const byte = text.charCodeAt(i);
                for (let bit = 7; bit >= 0; bit--) {
                    data.push((byte >> bit) & 1);
                }
            }

            let idx = 0;
            for (let x = len - 1; x >= 0; x -= 2) {
                if (x === 6) x--;
                for (let row = 0; row < len; row++) {
                    const y = (Math.floor((len - 1 - x) / 2) % 2 === 0) ? len - 1 - row : row;
                    if (!grid[y][x] && (x > 8 || y > 8)) {
                        grid[y][x] = idx < data.length ? data[idx++] === 1 : Math.random() > 0.5;
                    }
                }
            }

            return grid;
        }

        drawQR(otaUrl);
    </script>
